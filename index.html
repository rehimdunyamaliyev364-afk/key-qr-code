<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test və Tapşırıqlar</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #0f0c2e; color: #fff; min-height: 100vh; padding: 20px; }
h1 { text-align: center; color: #7aa8ff; margin-bottom: 24px; font-size: 1.6rem; }
.tabs { display: flex; gap: 10px; justify-content: center; margin-bottom: 24px; }
.tab { padding: 10px 28px; border-radius: 24px; border: none; cursor: pointer; font-size: 1rem; font-weight: bold; }
.tab.active { background: #ff3355; color: #fff; }
.tab:not(.active) { background: #1e1a4a; color: #aac0ff; }
.section { display: none; }
.section.active { display: block; }
.task-input { display: flex; gap: 8px; margin-bottom: 16px; }
.task-input input { flex: 1; padding: 10px 14px; border-radius: 10px; border: none; background: #1e1a4a; color: #fff; font-size: 1rem; }
.task-input button { padding: 10px 18px; border-radius: 10px; border: none; background: #7aa8ff; color: #0f0c2e; font-weight: bold; cursor: pointer; }
.task-list { list-style: none; }
.task-list li { display: flex; align-items: center; gap: 10px; background: #1e1a4a; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; }
.task-list li.done span { text-decoration: line-through; opacity: .5; }
.task-list li input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; accent-color: #7aa8ff; }
.task-list li span { flex: 1; }
.task-list li .del { background: none; border: none; color: #ff3355; font-size: 1.2rem; cursor: pointer; }
.question-block { background: #1e1a4a; border-radius: 14px; padding: 18px; margin-bottom: 16px; }
.question-block p { font-size: 1rem; margin-bottom: 12px; color: #ffd050; }
.options label { display: flex; align-items: center; gap: 8px; padding: 8px 0; cursor: pointer; }
.options input { accent-color: #7aa8ff; width: 16px; height: 16px; }
.check-btn { display: block; margin: 20px auto 0; padding: 12px 36px; background: #ff3355; color: #fff; border: none; border-radius: 24px; font-size: 1rem; font-weight: bold; cursor: pointer; }
.result { text-align: center; font-size: 1.3rem; margin-top: 16px; font-weight: bold; }
.correct { color: #00e676; }
.wrong { color: #ff3355; }
</style>
</head>
<body>
<h1>Test and Tapshiriqlar</h1>
<div class="tabs">
  <button class="tab active" onclick="switchTab('tasks',event)">Tapshiriqlar</button>
  <button class="tab" onclick="switchTab('quiz',event)">Test</button>
</div>
<div class="section active" id="tasks">
  <div class="task-input">
    <input type="text" id="taskInput" placeholder="Yeni tapshiriq yaz...">
    <button onclick="addTask()">Elave et</button>
  </div>
  <ul class="task-list" id="taskList"></ul>
</div>
<div class="section" id="quiz">
  <div id="questions"></div>
  <button class="check-btn" onclick="checkAnswers()">Yoxla</button>
  <div class="result" id="result"></div>
</div>
<script>
let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
function renderTasks() {
  const ul = document.getElementById('taskList');
  ul.innerHTML = '';
  tasks.forEach((t,i) => {
    const li = document.createElement('li');
    if(t.done) li.classList.add('done');
    li.innerHTML = '<input type="checkbox" '+(t.done?'checked':'')+' onchange="toggleTask('+i+')"><span>'+t.text+'</span><button class="del" onclick="deleteTask('+i+')">X</button>';
    ul.appendChild(li);
  });
  localStorage.setItem('tasks',JSON.stringify(tasks));
}
function addTask() {
  const inp = document.getElementById('taskInput');
  if(!inp.value.trim()) return;
  tasks.push({text:inp.value.trim(),done:false});
  inp.value='';
  renderTasks();
}
function toggleTask(i){tasks[i].done=!tasks[i].done;renderTasks();}
function deleteTask(i){tasks.splice(i,1);renderTasks();}
renderTasks();
const quizData = [
  {q:"Python-da siyahi nece yaradilir?",opts:["list={}","list=[]","list=()","list=<>"],ans:1},
  {q:"QR kod ne ucun istifade olunur?",opts:["Sekil cekmek","Melumat saxlamaq","Video izlemek","Oyun oynamaq"],ans:1},
  {q:"GitHub nedir?",opts:["Oyun platformu","Kod saxlama platformu","Video platformu","Sosial sebeke"],ans:1},
  {q:"Python-da cap funksiyasi hansidir?",opts:["echo()","console.log()","print()","write()"],ans:2},
  {q:"HTML nyin qisaltmasidir?",opts:["HyperText Markup Language","High Text Modern Language","Home Tool Markup","Hec biri"],ans:0}
];
function buildQuiz() {
  const div = document.getElementById('questions');
  div.innerHTML='';
  quizData.forEach((q,i) => {
    div.innerHTML+='<div class="question-block"><p>'+(i+1)+'. '+q.q+'</p><div class="options">'+q.opts.map((o,j)=>'<label><input type="radio" name="q'+i+'" value="'+j+'"> '+o+'</label>').join('')+'</div></div>';
  });
}
function checkAnswers() {
  let score=0;
  quizData.forEach((q,i) => {
    const sel=document.querySelector('input[name="q'+i+'"]:checked');
    if(sel && parseInt(sel.value)===q.ans) score++;
  });
  const res=document.getElementById('result');
  res.className='result '+(score>=3?'correct':'wrong');
  res.textContent='Netice: '+score+'/'+quizData.length+' — '+(score>=4?'Ela!':score>=3?'Yaxshi!':'Daha calis!');
}
buildQuiz();
function switchTab(name,e) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  e.target.classList.add('active');
}
</script>
</body>
</html>
